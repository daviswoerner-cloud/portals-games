<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MELTDOWN HUD</title>
<script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent !important;
    font-family: 'Courier New', 'Menlo', monospace;
    color: white;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  .hud {
    background: linear-gradient(180deg, rgba(8,12,28,0.92) 0%, rgba(3,6,16,0.92) 100%);
    border: 1px solid #00FFFF;
    border-radius: 10px;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    box-shadow: 0 0 18px rgba(0,255,255,0.18), inset 0 0 10px rgba(0,255,255,0.06);
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2px;
  }
  .brand {
    font-size: 10px;
    letter-spacing: 2px;
    color: #00FFFF;
    text-shadow: 0 0 6px #00FFFF;
  }
  .coins {
    font-size: 14px;
    font-weight: bold;
    color: #FFD700;
    text-shadow: 0 0 6px rgba(255,215,0,0.6);
  }
  .slots {
    display: grid;
    grid-template-columns: repeat(6, 78px);
    gap: 4px;
  }
  .slot {
    background: rgba(0,255,255,0.04);
    border: 1px solid rgba(0,255,255,0.25);
    border-radius: 6px;
    padding: 6px 4px 4px;
    text-align: center;
    cursor: pointer;
    transition: transform 80ms ease, background 80ms ease, border-color 80ms ease;
    position: relative;
  }
  .slot:hover:not(.disabled) {
    background: rgba(0,255,255,0.15);
    border-color: #00FFFF;
    transform: translateY(-2px);
  }
  .slot:active:not(.disabled) { transform: translateY(0); }
  .slot.disabled { opacity: 0.35; cursor: not-allowed; }
  .slot .icon {
    font-size: 22px;
    line-height: 1;
    display: block;
    filter: drop-shadow(0 0 3px currentColor);
  }
  .slot .label {
    font-size: 9px;
    letter-spacing: 0.5px;
    color: #AAD8FF;
    margin-top: 3px;
    text-transform: uppercase;
  }
  .slot .count {
    position: absolute;
    top: 2px;
    right: 4px;
    background: #0C1424;
    border: 1px solid #00FFFF;
    color: #00FFFF;
    font-size: 10px;
    font-weight: bold;
    border-radius: 8px;
    min-width: 16px;
    height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 3px;
  }
  .slot.disabled .count {
    border-color: #445;
    color: #667;
  }
  .slot .hotkey {
    position: absolute;
    top: 2px;
    left: 4px;
    font-size: 9px;
    color: #556;
  }
  /* per-item colors */
  .slot.shield .icon    { color: #00AAFF; }
  .slot.amplifier .icon { color: #FFD700; }
  .slot.hackkit .icon   { color: #00FF88; }
  .slot.teleporter .icon{ color: #FF00FF; }
  .slot.mine .icon      { color: #FF3344; }
  .slot.scanner .icon   { color: #AAAAAA; }

  @keyframes flash {
    0%   { box-shadow: 0 0 0 0 rgba(0,255,255,0.8); }
    100% { box-shadow: 0 0 0 12px rgba(0,255,255,0); }
  }
  .slot.flash { animation: flash 400ms ease-out; }
</style>
</head>
<body>
<div class="hud" id="hud">
  <div class="header">
    <span class="brand">MELTDOWN · INV</span>
    <span class="coins" id="coins">⬢ 0</span>
  </div>
  <div class="slots" id="slots"></div>
</div>
<script>
  const ITEMS = [
    { id: 'shield',     label: 'Shield',  icon: '⛨', task: 'use_shield',     hotkey: '1' },
    { id: 'amplifier',  label: 'Amplify', icon: '⚡', task: 'use_amplifier',  hotkey: '2' },
    { id: 'hackkit',    label: 'HackKit', icon: '⬡', task: 'use_hackkit',    hotkey: '3' },
    { id: 'teleporter', label: 'Teleport',icon: '◉', task: 'use_teleporter', hotkey: '4' },
    { id: 'mine',       label: 'Mine',    icon: '✦', task: 'use_mine',       hotkey: '5' },
    { id: 'scanner',    label: 'Scanner', icon: '◎', task: 'use_scanner',    hotkey: '6' },
  ];

  const state = { coins: 0, shield: 0, amplifier: 0, hackkit: 0, teleporter: 0, mine: 0, scanner: 0 };
  const sdk = typeof PortalsSdk !== 'undefined' ? PortalsSdk : null;

  // Build DOM
  const slotsEl = document.getElementById('slots');
  const slotElems = {};
  ITEMS.forEach(it => {
    const el = document.createElement('div');
    el.className = 'slot ' + it.id + ' disabled';
    el.dataset.id = it.id;
    el.innerHTML =
      '<span class="hotkey">' + it.hotkey + '</span>' +
      '<span class="count">0</span>' +
      '<span class="icon">' + it.icon + '</span>' +
      '<span class="label">' + it.label + '</span>';
    el.addEventListener('click', () => use(it));
    slotsEl.appendChild(el);
    slotElems[it.id] = el;
  });

  function render() {
    document.getElementById('coins').textContent = '⬢ ' + Math.floor(state.coins || 0);
    ITEMS.forEach(it => {
      const n = Math.floor(state[it.id] || 0);
      const el = slotElems[it.id];
      el.querySelector('.count').textContent = n;
      el.classList.toggle('disabled', n <= 0);
    });
  }

  function use(it) {
    const n = Math.floor(state[it.id] || 0);
    if (n <= 0) return;
    // Optimistic local decrement for responsiveness (game will resync)
    state[it.id] = n - 1;
    render();
    // Flash
    const el = slotElems[it.id];
    el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash');
    // Fire Portals task
    if (sdk) {
      sdk.sendMessageToUnity(JSON.stringify({
        TaskName: it.task,
        TaskTargetState: 'SetNotActiveToCompleted'
      }));
      // Return keyboard focus to the game so WASD still works
      if (sdk.focusGameKeyboard) sdk.focusGameKeyboard();
    }
  }

  // Message format from Portals:  "hud:<coins>,<shield>,<amp>,<hack>,<tele>,<mine>,<scan>"
  function parseMessage(msg) {
    if (typeof msg !== 'string') return;
    const m = msg.match(/^hud:([\d.\-,]+)/);
    if (!m) return;
    const parts = m[1].split(',').map(v => parseFloat(v) || 0);
    state.coins      = parts[0] || 0;
    state.shield     = parts[1] || 0;
    state.amplifier  = parts[2] || 0;
    state.hackkit    = parts[3] || 0;
    state.teleporter = parts[4] || 0;
    state.mine       = parts[5] || 0;
    state.scanner    = parts[6] || 0;
    render();
  }

  if (sdk) sdk.setMessageListener(parseMessage);

  // Hotkeys 1-6
  window.addEventListener('keydown', (e) => {
    const idx = '123456'.indexOf(e.key);
    if (idx >= 0) use(ITEMS[idx]);
  });

  // Initial render
  render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MELTDOWN Item Shop</title>
    <script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
    <style>
        html, body {
            margin: 0; padding: 0;
            background: transparent !important;
            overflow: hidden;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
            user-select: none;
        }

        .shop-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
        }

        .shop {
            width: 460px;
            max-height: 92vh;
            background: linear-gradient(170deg, rgba(2, 12, 28, 0.96), rgba(0, 6, 18, 0.98));
            border: 1.5px solid #00AAFF;
            border-radius: 14px;
            box-shadow:
                0 0 40px rgba(0, 170, 255, 0.25),
                0 0 80px rgba(0, 100, 200, 0.1),
                inset 0 1px 0 rgba(0, 200, 255, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Scanline overlay */
        .shop::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 170, 255, 0.015) 2px, rgba(0, 170, 255, 0.015) 4px);
            pointer-events: none;
            z-index: 5;
        }

        /* ─── HEADER ─── */
        .header {
            padding: 16px 20px 14px;
            background: linear-gradient(135deg, rgba(0, 30, 60, 0.8), rgba(0, 50, 100, 0.6));
            border-bottom: 1px solid rgba(0, 140, 220, 0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 3px;
            color: #00CCFF;
            text-shadow: 0 0 12px rgba(0, 200, 255, 0.5), 0 0 30px rgba(0, 150, 255, 0.2);
        }
        .title .sub {
            display: block;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 1.5px;
            color: #4488AA;
            margin-top: 2px;
        }

        .coins {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 20px;
            font-weight: 800;
            color: #FFD700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }
        .coins svg { width: 22px; height: 22px; filter: drop-shadow(0 0 4px rgba(255,215,0,0.5)); }

        /* ─── ITEMS GRID ─── */
        .items {
            flex: 1;
            overflow-y: auto;
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .items::-webkit-scrollbar { width: 4px; }
        .items::-webkit-scrollbar-track { background: transparent; }
        .items::-webkit-scrollbar-thumb { background: #003366; border-radius: 2px; }

        .item {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            background: linear-gradient(135deg, rgba(0, 20, 45, 0.7), rgba(0, 30, 60, 0.5));
            border: 1px solid rgba(0, 100, 180, 0.25);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .item:hover:not(.no-buy) {
            background: linear-gradient(135deg, rgba(0, 40, 80, 0.8), rgba(0, 60, 120, 0.6));
            border-color: #00AAFF;
            transform: translateX(4px);
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.15);
        }
        .item:active:not(.no-buy) {
            transform: translateX(2px) scale(0.99);
        }

        .item.no-buy {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .item.bought {
            animation: buyFlash 0.7s ease;
        }
        @keyframes buyFlash {
            0% { background: rgba(0, 255, 136, 0.4); border-color: #00FF88; box-shadow: 0 0 20px rgba(0,255,136,0.3); }
            100% { background: linear-gradient(135deg, rgba(0, 20, 45, 0.7), rgba(0, 30, 60, 0.5)); border-color: rgba(0,100,180,0.25); }
        }

        /* Shimmer on hover */
        .item::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 200, 255, 0.06), transparent);
            transition: left 0.5s ease;
            pointer-events: none;
        }
        .item:hover:not(.no-buy)::before { left: 120%; }

        .item-icon {
            width: 38px; height: 38px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 12px;
            flex-shrink: 0;
            background: rgba(0, 60, 120, 0.4);
            border: 1px solid rgba(0, 120, 200, 0.3);
        }

        .item-body { flex: 1; min-width: 0; }
        .item-name {
            font-size: 14px;
            font-weight: 700;
            color: #E8F4FF;
            margin-bottom: 3px;
        }
        .item-desc {
            font-size: 11px;
            color: #5588AA;
            line-height: 1.3;
        }
        .item-qty {
            font-size: 10px;
            color: #00DD88;
            margin-top: 2px;
            font-weight: 600;
        }

        .item-price {
            margin-left: 12px;
            flex-shrink: 0;
            text-align: right;
        }
        .item-price .amount {
            font-size: 17px;
            font-weight: 800;
            color: #FFD700;
            text-shadow: 0 0 6px rgba(255,215,0,0.3);
        }
        .item-price .label {
            font-size: 9px;
            color: #667788;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ─── FOOTER ─── */
        .footer {
            padding: 10px 16px;
            border-top: 1px solid rgba(0, 120, 200, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .footer-hint {
            font-size: 10px;
            color: #334455;
            letter-spacing: 0.5px;
        }
        .close-btn {
            padding: 6px 18px;
            background: linear-gradient(135deg, rgba(255, 60, 60, 0.15), rgba(200, 40, 40, 0.25));
            border: 1px solid rgba(255, 80, 80, 0.35);
            border-radius: 6px;
            color: #FF8888;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
        }
        .close-btn:hover {
            background: linear-gradient(135deg, rgba(255, 60, 60, 0.3), rgba(200, 40, 40, 0.4));
            color: #FFAAAA;
            border-color: rgba(255, 100, 100, 0.5);
        }

        /* ─── TOAST ─── */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 50;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.success {
            background: rgba(0, 220, 120, 0.92);
            color: #003322;
            box-shadow: 0 0 20px rgba(0, 220, 120, 0.3);
        }
        .toast.error {
            background: rgba(255, 70, 70, 0.92);
            color: #FFF;
            box-shadow: 0 0 20px rgba(255, 70, 70, 0.3);
        }
    </style>
</head>
<body>
    <div class="shop-wrap">
        <div class="shop">
            <div class="header">
                <div class="title">
                    ITEM SHOP
                    <span class="sub">SPACE STATION ARMORY</span>
                </div>
                <div class="coins">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#FFD700" stroke="#B8860B" stroke-width="1.5"/><text x="12" y="16" text-anchor="middle" font-size="12" font-weight="bold" fill="#8B6914">$</text></svg>
                    <span id="coinCount">--</span>
                </div>
            </div>

            <div class="items" id="itemsList"></div>

            <div class="footer">
                <span class="footer-hint">Click item to purchase</span>
                <button class="close-btn" onclick="closeShop()">CLOSE</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ═══════════════════════════════════════
        // MELTDOWN SHOP — Item Definitions
        // Matches design doc v2 locked prices
        // ═══════════════════════════════════════
        const ITEMS = [
            { id: 1, name: 'Shield',              icon: '\u{1F6E1}',  desc: 'Blocks one steal or loss event',      cost: 5,  variable: 'p_shield',     stackable: true,  quest: '116_shop_buy_1' },
            { id: 2, name: 'Amplifier',            icon: '\u{1F4E1}',  desc: 'Doubles your next gain event',        cost: 7,  variable: 'p_amplifier',  stackable: false, quest: '117_shop_buy_2' },
            { id: 3, name: 'Hacking Kit',          icon: '\u{1F4BB}',  desc: 'Steal coins from a chosen player',    cost: 8,  variable: 'p_hackkit',    stackable: false, quest: '118_shop_buy_3' },
            { id: 4, name: 'Personal Teleporter',   icon: '\u{26A1}',   desc: 'Warp to any space on the board',      cost: 20, variable: 'p_teleporter', stackable: false, quest: '119_shop_buy_4' },
            { id: 5, name: 'Proximity Mine',        icon: '\u{1F4A3}',  desc: 'Trap a space — next visitor loses 5', cost: 7,  variable: 'p_mine',       stackable: true,  quest: '120_shop_buy_5' },
            { id: 6, name: 'Scanner',               icon: '\u{1F50D}',  desc: 'Peek at next 3 spaces ahead',         cost: 4,  variable: 'p_scanner',    stackable: false, quest: '121_shop_buy_6' },
        ];

        let coins = 0;
        let inventory = {};  // variable -> count

        const sdk = typeof PortalsSdk !== 'undefined' ? PortalsSdk : null;

        // ─── RENDER ───
        function render() {
            const list = document.getElementById('itemsList');
            list.innerHTML = '';

            ITEMS.forEach(item => {
                const qty = inventory[item.variable] || 0;
                const isOwned = !item.stackable && qty > 0;
                const canAfford = coins >= item.cost;
                const canBuy = canAfford && !isOwned;

                const el = document.createElement('div');
                el.className = 'item' + (!canBuy ? ' no-buy' : '');
                el.dataset.id = item.id;

                el.innerHTML = `
                    <div class="item-icon">${item.icon}</div>
                    <div class="item-body">
                        <div class="item-name">${item.name}</div>
                        <div class="item-desc">${item.desc}</div>
                        ${qty > 0 && item.stackable ? '<div class="item-qty">Owned: x' + qty + '</div>' : ''}
                        ${isOwned ? '<div class="item-qty">EQUIPPED</div>' : ''}
                    </div>
                    <div class="item-price">
                        <div class="amount">${item.cost}</div>
                        <div class="label">coins</div>
                    </div>
                `;

                if (canBuy) {
                    el.addEventListener('click', () => buyItem(item));
                }

                list.appendChild(el);
            });

            document.getElementById('coinCount').textContent = coins;
        }

        // ─── BUY ───
        function buyItem(item) {
            const qty = inventory[item.variable] || 0;
            if (coins < item.cost || (!item.stackable && qty > 0)) return;

            // Optimistic local update
            coins -= item.cost;
            inventory[item.variable] = qty + 1;
            render();

            // Flash animation
            const el = document.querySelector(`.item[data-id="${item.id}"]`);
            if (el) {
                el.classList.add('bought');
                setTimeout(() => el.classList.remove('bought'), 700);
            }

            toast(item.name + ' acquired!', 'success');

            // Send quest completion to Portals
            if (sdk) {
                sdk.sendMessageToUnity(JSON.stringify({
                    TaskName: item.quest,
                    TaskTargetState: 'SetNotActiveToCompleted'
                }));
            }
        }

        // ─── TOAST ───
        function toast(msg, type) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast show ' + (type || 'success');
            clearTimeout(el._timer);
            el._timer = setTimeout(() => { el.className = 'toast'; }, 2200);
        }

        // ─── RECEIVE STATE FROM PORTALS ───
        if (sdk) {
            sdk.setMessageListener((message) => {
                // Format: "shop:|p_coins|,|p_shield|,|p_amplifier|,|p_hackkit|,|p_teleporter|,|p_mine|,|p_scanner|"
                if (message.startsWith('shop:')) {
                    const parts = message.replace('shop:', '').split(',');
                    if (parts.length >= 7) {
                        coins = parseInt(parts[0]) || 0;
                        inventory['p_shield']     = parseInt(parts[1]) || 0;
                        inventory['p_amplifier']  = parseInt(parts[2]) || 0;
                        inventory['p_hackkit']    = parseInt(parts[3]) || 0;
                        inventory['p_teleporter'] = parseInt(parts[4]) || 0;
                        inventory['p_mine']       = parseInt(parts[5]) || 0;
                        inventory['p_scanner']    = parseInt(parts[6]) || 0;
                        render();
                    }
                }
            });
        }

        // ─── CLOSE ───
        function closeShop() {
            if (sdk) {
                sdk.sendMessageToUnity(JSON.stringify({
                    TaskName: '110_shop_menu',
                    TaskTargetState: 'ToNotActive'
                }));
                sdk.closeIframe();
            }
        }

        // ─── INIT ───
        const params = new URLSearchParams(window.location.search);
        coins = parseInt(params.get('coins')) || 0;
        render();

        // The initial SendMessageToIframes from Portals often fires BEFORE
        // this iframe finishes loading, so we miss the state message.
        // Fix: on load, tell Unity we're ready by requesting a state refresh.
        // We use a dedicated "shop_state_req" quest that triggers
        // SendMessageToIframes without re-opening the iframe.
        // Fallback: retry a few times in case of slow load.
        if (sdk) {
            let gotState = false;

            // Wrap message listener to track state arrival
            const origListener = sdk._messageListener;
            sdk.setMessageListener((message) => {
                if (message.startsWith('shop:')) {
                    gotState = true;
                    const parts = message.replace('shop:', '').split(',');
                    if (parts.length >= 7) {
                        coins = parseInt(parts[0]) || 0;
                        inventory['p_shield']     = parseInt(parts[1]) || 0;
                        inventory['p_amplifier']  = parseInt(parts[2]) || 0;
                        inventory['p_hackkit']    = parseInt(parts[3]) || 0;
                        inventory['p_teleporter'] = parseInt(parts[4]) || 0;
                        inventory['p_mine']       = parseInt(parts[5]) || 0;
                        inventory['p_scanner']    = parseInt(parts[6]) || 0;
                        render();
                    }
                }
            });

            // Request state refresh from Unity at intervals
            function requestRefresh() {
                if (gotState) return;
                sdk.sendMessageToUnity(JSON.stringify({
                    TaskName: 'shop_state_req',
                    TaskTargetState: 'SetNotActiveToCompleted'
                }));
            }
            setTimeout(requestRefresh, 300);
            setTimeout(requestRefresh, 1000);
            setTimeout(requestRefresh, 2500);
        }

        // Dev mode preview
        if (!sdk) {
            coins = 25;
            inventory = { p_shield: 1, p_mine: 2 };
            render();
            console.log('Dev mode — SDK not available');
        }
    </script>
</body>
</html>
